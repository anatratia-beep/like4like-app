<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Like4Like Etudiants</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="conteneur">
  <div class="entete">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="/img/logo.png" alt="IBDA" style="width:28px;height:28px;border-radius:50%;">
      <h2 id="titrePage">Fil des publications</h2>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="secondaire" style="width:auto;padding:6px 10px;font-size:9px;flex-direction:column;gap:2px;line-height:1;" onclick="activerNotifications()" title="Recevoir une alerte a chaque credit, debit ou message"></button>
      <button class="secondaire" style="width:auto;padding:6px 12px;font-size:12.5px;" onclick="deconnexion()">Quitter</button>
    </div>
  </div>
  <div class="ledger">
    <div class="poste"><div class="valeur" id="soldeJetons">–</div><div class="label">Jetons</div></div>
    <div class="poste"><div class="valeur" id="soldePoints">–</div><div class="label">Points</div></div>
    <div class="poste"><div class="valeur" id="soldeAriary">–</div><div class="label">Ariary</div></div>
  </div>
  <div class="contenu-page" id="contenuPage"></div>
  <div class="nav-bas">
    <button data-onglet="fil" onclick="afficherOnglet('fil')"><span class="icone-fil"></span>Fil</button>
    <button data-onglet="publier" onclick="afficherOnglet('publier')"><span class="icone-publier"></span>Publier</button>
    <button data-onglet="valider" onclick="afficherOnglet('valider')"><span class="icone-valider"></span>À valider</button>
    <button data-onglet="portefeuille" onclick="afficherOnglet('portefeuille')"><span class="icone-portefeuille"></span>Portefeuille</button>
    <button data-onglet="messages" onclick="afficherOnglet('messages')"><span class="icone-messages"></span>Messages</button>
    <button data-onglet="profil" onclick="afficherOnglet('profil')"><span class="icone-profil"></span>Profil</button>
  </div>
</div>
<script src="/js/noyau.js"></script>
<script src="/js/app.js"></script>
<script>
document.querySelector('.icone-fil').innerHTML = ICONES.fil;
document.querySelector('.icone-publier').innerHTML = ICONES.publier;
document.querySelector('.icone-valider').innerHTML = ICONES.valider;
document.querySelector('.icone-portefeuille').innerHTML = ICONES.portefeuille;
document.querySelector('.icone-messages').innerHTML = ICONES.messages;
document.querySelector('.icone-profil').innerHTML = ICONES.profil;
document.querySelector('[onclick="activerNotifications()"]').innerHTML = ICONES.cloche + '<span style="text-transform:uppercase;letter-spacing:0.03em;">Notifications</span>';
</script>
</body>
</html>
